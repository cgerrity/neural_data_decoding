# MkDocs Material config for the narrative documentation site.
#
# Build:    mkdocs build --strict
# Serve:    mkdocs serve
# Deploy:   mike deploy <version>   (versioned docs via mike)
#
# The API reference (Sphinx-generated) builds separately under docs/api/.
# scripts/build_docs.sh runs both and assembles the unified site.

site_name: neural_data_decoding
site_description: Python port of the MATLAB neural decoding pipeline.
site_dir: build/narrative
copyright: Copyright &copy; 2026 Charles Gerrity. All rights reserved. Proprietary and confidential.

docs_dir: narrative

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - tables

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../src]
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            members_order: source

# Versioned docs are published with `mike` (see scripts/build_docs.sh and the
# manual "deploy" job in .github/workflows/docs.yml). This block renders the
# version selector in the built site; it is inert until a mike deploy runs.
extra:
  version:
    provider: mike

