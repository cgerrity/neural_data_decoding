# Milestone C — Stochastic VAE (GRU encoder + bottleneck(2*latent) +
# sampling + decoder + Deep LSTM classifier) on Synthetic_Easy.
#
# Exercises (Critical Notes in parens):
#   - VAE sampling layer (Note #35: deterministic at eval)
#   - NaN-masked ELBO reconstruction (Note #38: batch-size normalization)
#   - KL divergence
#   - Deep LSTM classifier on the sampled latent
#   - EMA prior normalization across recon + KL + classification (Notes
#     #6, #30: Classification's prior is the cross-component reference)
#   - Single gradient root Loss_Encoder (Note #28)
#
# Still deferred to later chunks of Milestone C:
#   - Confidence routing (the kernel exists but isn't wired into the
#     forward path of VariationalComposite yet — that connection lives
#     with the curriculum schedules)
#   - MIL softmax pooling integration (the kernel exists; classifier
#     output post-processing is upcoming)
#   - Dynamic curriculum schedules (load/loss-weight/freeze)
#   - Stage 1 unsupervised pre-training

defaults:
  - /base
  - _self_

# ───────────────────────── Run identity ─────────────────────────
epoch: Synthetic_Easy
target: Dimension

# ───────────────────────── Architecture ─────────────────────────
model_name: GRU
classifier_name: "Deep LSTM - Dropout 0.5"
# HiddenSize convention: last entry is the latent/bottleneck size.
# [encoder_h, latent] → encoder stack [16], latent 4.
hidden_sizes: [16, 4]
classifier_hidden_size: [8, 4]
is_variational: true
encoder_output_type: Stochastic
loss_type_decoder: "MSE"

dropout: 0.0
classifier_dropout: 0.5
want_normalization: false
activation: ""

# ───────────────────────── Confidence / MIL disabled (deferred) ─────────────────────────
confidence_type: []
multiple_instance_learning_type: "None"
want_batch_correction: false

# ───────────────────────── Loss weights ─────────────────────────
# EMA prior normalization rescales all components to classification's
# magnitude, so these weights act on the post-normalization scale.
# (Optimal config in the plan: recon=100, KL=1, class=10.)
weight_reconstruction: 100
weight_kl: 1
weight_classification: 10
weight_confidence: 0
weight_offset_and_scale: 0
prior_proportion: 0.9

# ───────────────────────── Training schedule ─────────────────────────
optimizer: ADAM
weighted_loss: Inverse
gradient_clip_type: Global
num_epochs_autoencoder: 0
num_epochs_full: 20
initial_learning_rate: 0.005
mini_batch_size: 16
dynamic_parameter_set: "No Dynamic Parameters"

# ───────────────────────── Synthetic data parameters ─────────────────────────
synthetic_num_sessions: 4
synthetic_trials_per_session: 64
synthetic_num_samples: 30
synthetic_num_features: 8
synthetic_num_classes_per_dim: [3, 4]
synthetic_signal_strength: 1.5
synthetic_validation_fraction: 0.2
