# Milestone C #6 — Full two-stage lifecycle on Synthetic_Easy.
#
# Stage 1: 5 epochs of unsupervised autoencoder pre-training
#   (encoder + bottleneck + decoder; reconstruction + KL only).
# Optimal Stage 1 weights are handed off into the Stage 2 composite.
# Stage 2: 15 epochs of supervised fine-tuning of the full composite
#   (encoder + decoder + classifier), with the Soft Three-Stage Curriculum
#   active from the start of Stage 2.
#
# Stage 1 checkpoints land in `<result_dir>/stage1_autoencoder/`;
# Stage 2 uses `<result_dir>/` directly. Both stages are resumable
# independently.

defaults:
  - /base
  - _self_

# ───────────────────────── Run identity ─────────────────────────
epoch: Synthetic_Easy
target: Dimension

# ───────────────────────── Architecture ─────────────────────────
model_name: GRU
classifier_name: "Deep LSTM - Dropout 0.5"
hidden_sizes: [16, 4]
classifier_hidden_size: [8, 4]
is_variational: true
encoder_output_type: Stochastic
loss_type_decoder: "MSE"

dropout: 0.0
classifier_dropout: 0.5
want_normalization: false
activation: ""

# ───────────────────────── Confidence / MIL disabled (deferred) ─────────────────────────
confidence_type: []
multiple_instance_learning_type: "None"
want_batch_correction: false

# ───────────────────────── Loss weights ─────────────────────────
weight_reconstruction: 100
weight_kl: 1
weight_classification: 10
weight_confidence: 0
weight_offset_and_scale: 0
prior_proportion: 0.9

# ───────────────────────── Two-stage training schedule ─────────────────────────
optimizer: ADAM
weighted_loss: Inverse
gradient_clip_type: Global

# Stage 1: 5 epochs of unsupervised pre-training.
num_epochs_autoencoder: 5
# Stage 2: 15 epochs of supervised fine-tuning of the full composite.
num_epochs_full: 15
initial_learning_rate: 0.005
mini_batch_size: 16
dynamic_parameter_set: "Soft Three-Stage Curriculum - Shortened"

# Augmentation bases for the live-schedule (Critical Note #8).
std_channel_offset: 0.03
std_white_noise: 0.015
std_random_walk: 0.0007
std_time_shift: 100

# Legacy KL anneal (mirrors cgg_annealWeight inside cgg_trainNetwork).
# Applied per-stage: each stage's KL weight ramps from 0 to weight_kl
# between epochs weight_delay_epoch and weight_delay_epoch+weight_epoch_ramp,
# THEN the dynamic curriculum's KL magnitude multiplies on top.
weight_delay_epoch: 2
weight_epoch_ramp: 3

# ───────────────────────── Synthetic data parameters ─────────────────────────
synthetic_num_sessions: 4
synthetic_trials_per_session: 64
synthetic_num_samples: 30
synthetic_num_features: 8
synthetic_samples_per_window: 2
synthetic_num_areas: 2
synthetic_num_classes_per_dim: [3, 4]
synthetic_signal_strength: 1.5
synthetic_validation_fraction: 0.2
