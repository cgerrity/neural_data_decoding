# Base configuration — mirrors the defaults in PARAMETERS_cgg_runAutoEncoder.m.
#
# Override via Hydra composition. Example:
#   python -m neural_data_decoding train \
#       +target_milestone=A_logistic_synthetic --fold 1
#
# The Optimal configuration (see optimal.yaml) is the production target.
# Milestone-specific targets (configs/target_milestone/*.yaml) compose this
# base with an architecture (configs/architecture/*.yaml) and a schedule
# (configs/schedule/*.yaml).
#
# IMPORTANT: every field in this file must appear in every saved
# EncodingParameters.yaml so cgg_plotParameterSweep can compare across runs
# (Critical Note #25 in the plan). Add new fields here even if they default
# to a no-op value.

defaults:
  - _self_

# ───────────────────────── Run identity ─────────────────────────
fold: 1
epoch: Decision
target: Dimension

# ───────────────────────── Architecture ─────────────────────────
model_name: GRU
classifier_name: "Deep LSTM - Dropout 0.5"
hidden_sizes: [1000, 500, 250]
classifier_hidden_size: [250, 100, 50]
is_variational: true
encoder_output_type: Stochastic    # Stochastic | Deterministic
bottle_neck_depth: 1
dropout: 0.5
want_normalization: false
activation: ""
stitching_and_fusion_layer: ""     # disabled by default; Milestone CC

# ───────────────────────── Training ─────────────────────────
optimizer: ADAM                    # ADAM | SGDM (Milestone CC)
weighted_loss: Inverse             # Inverse | "" (Milestone CC)
loss_type_decoder: MSE             # MSE | MAE (CC) | None
loss_type_classifier: CrossEntropy # CrossEntropy

num_epochs_autoencoder: 0          # Stage 1 (unsupervised); 0 = skip stage 1
num_epochs_full: 500               # Stage 2 (supervised)
mini_batch_size: 100
gradient_threshold: 100
gradient_clip_type: Global         # Global | SubNetwork

initial_learning_rate: 0.001
learning_rate_decay: 0.9
learning_rate_epoch_drop: 30
learning_rate_epoch_ramp: 0

# ───────────────────────── Loss weights ─────────────────────────
weight_reconstruction: 100
weight_kl: 1
weight_classification: 10
weight_offset_and_scale: 0
weight_confidence: 1
prior_proportion: 0.9
rescale_loss_epoch: 0              # 0 = update EMA every iteration; 1 = per epoch; >1 = every N epochs
l2_factor: 1.0e-4

# KL annealing
weight_delay_epoch: 2
weight_epoch_ramp: 3

# ───────────────────────── Confidence / MIL ─────────────────────────
confidence_type: ["Trial", "Task"]
multiple_instance_learning_type: MIL    # MIL | None
want_batch_correction: false

# ───────────────────────── Data augmentation (initial values; curriculum overrides per-epoch) ─────────────────────────
std_channel_offset: 0.03      # 0.3 * 0.1 (per Optimal v3)
std_white_noise: 0.015        # 0.15 * 0.1
std_random_walk: 0.0007       # 0.007 * 0.1
std_time_shift: 100
want_separate_time_shift: true

# ───────────────────────── Data partitioning ─────────────────────────
data_width: 100
starting_idx: All
ending_idx: All
window_stride: 50
subset: true
want_stratified_partition: true
class_lower_count: 20
start_end_percent: [.nan, .nan]
normalization: "Channel - Z-Score - Global - MinMax - [-1,1] - Zero Centered - Range 0.5"

# ───────────────────────── Curriculum ─────────────────────────
dynamic_parameter_set: "Soft Three-Stage Curriculum - Shortened"

# ───────────────────────── Validation & checkpoint cadence ─────────────────────────
validation_frequency: 25
save_frequency: 25
iteration_save_frequency: 25
validate_every_n_iterations: null   # null = use Python-default per-epoch validation (Critical Note #21)

want_save_net: false
want_save_optimal_net: true

# ───────────────────────── Monitoring ─────────────────────────
want_progress_monitor: true
want_example_monitor: true
want_component_monitor: true
want_accuracy_monitor: true
want_window_monitor: true
want_reconstruction_monitor: true
want_gradient_monitor: true
accuracy_measures: ["Scaled_BalancedAccuracy"]

# ───────────────────────── Hardware-aware accumulation (Critical Note #18) ─────────────────────────
max_worker_mini_batch_size: 100
accumulation_information:
  CPU: 100
  "NVIDIA TITAN X (Pascal)": 20
  "NVIDIA TITAN Xp": 20
  "NVIDIA RTX A4000": 20
  "NVIDIA RTX A6000": 20
